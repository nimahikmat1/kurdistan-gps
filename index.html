<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Erbil Navigator — Kurdistan GPS</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:#0f172a}

/* ── Map ── */
#map{width:100%;height:100%;position:absolute;inset:0}

/* ── Loading ── */
#loading{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 50%,#7c2d12 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;
  z-index:9000;gap:20px;transition:opacity .5s ease;
}
.spinner{width:52px;height:52px;border:3px solid rgba(255,255,255,.12);border-top-color:#fbbf24;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:12px;color:rgba(255,255,255,.6);letter-spacing:.08em;text-transform:uppercase;font-weight:500}
#loading h2{font-size:26px;color:#fbbf24;font-weight:800;letter-spacing:.1em;text-transform:uppercase;text-shadow:0 4px 16px rgba(0,0,0,.5)}

/* ── Search panel ── */
#search-panel{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  width:min(440px,calc(100vw - 18px));z-index:1100;
}
#search-box{
  display:flex;align-items:center;gap:10px;
  background:rgba(255,255,255,.97);backdrop-filter:blur(20px);
  border:2px solid #fbbf24;border-radius:20px;
  padding:0 14px;box-shadow:0 12px 40px rgba(0,0,0,.35),0 0 20px rgba(251,191,36,.15);
  transition:border-color .25s,box-shadow .25s;
}
#search-box:focus-within{
  border-color:#3b82f6;box-shadow:0 16px 48px rgba(0,0,0,.4),0 0 0 4px rgba(59,130,246,.15);
}
#search-box svg{flex-shrink:0;opacity:.4}
#search-input{
  flex:1;background:none;border:none;outline:none;
  color:#111827;font-size:15px;line-height:1.2;padding:15px 0;font-weight:600;
  caret-color:#3b82f6;letter-spacing:.2px;font-family:'Outfit',sans-serif;
}
#search-input::placeholder{color:#9ca3af;font-weight:400}
#clear-btn{
  background:none;border:none;color:#9ca3af;cursor:pointer;
  font-size:15px;padding:4px 2px;line-height:1;display:none;flex-shrink:0;
  border-radius:50%;width:24px;height:24px;align-items:center;justify-content:center;
  transition:color .2s,background .2s;
}
#clear-btn:hover{color:#374151;background:#f3f4f6}
#voice-btn{
  background:none;border:none;color:#9ca3af;cursor:pointer;
  padding:4px 2px;flex-shrink:0;
  border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  transition:color .2s,background .2s;font-size:15px;
}
#voice-btn:hover{color:#374151;background:#f3f4f6}
#voice-btn.listening{color:#dc2626;animation:voicePulse 1s ease-in-out infinite}
@keyframes voicePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

/* ── Suggestions ── */
#suggestions{
  margin-top:7px;background:rgba(255,255,255,.99);backdrop-filter:blur(20px);
  border:2px solid rgba(251,191,36,.6);border-radius:18px;
  overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.3);
  display:none;max-height:340px;overflow-y:auto;animation:slideDown .2s ease;
}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* Search categories row */
#search-cats{
  display:flex;gap:6px;padding:10px 12px 6px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid #f1f5f9;
}
#search-cats::-webkit-scrollbar{display:none}
.cat-pill{
  flex-shrink:0;background:#f1f5f9;border:1px solid #e2e8f0;
  border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;
  color:#374151;cursor:pointer;white-space:nowrap;transition:all .18s;
}
.cat-pill:hover,.cat-pill.active{background:#fbbf24;border-color:#fbbf24;color:#111827}

.s-section-label{
  padding:8px 14px 4px;font-size:11px;color:#9ca3af;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
}
.s-item{
  display:flex;align-items:center;gap:12px;
  min-height:58px;padding:10px 14px;cursor:pointer;
  border-bottom:1px solid rgba(241,245,249,.9);transition:background .15s;
}
.s-item:last-child{border-bottom:none}
.s-item:hover,.s-item:active{background:#f8fafc}
.s-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
.s-text{flex:1;overflow:hidden}
.s-name{font-size:14px;color:#111827;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-name mark{background:rgba(251,191,36,.35);color:#111827;border-radius:2px;font-weight:700}
.s-addr{font-size:12px;color:#6b7280;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.s-dist{font-size:11px;color:#3b82f6;font-weight:600;flex-shrink:0;margin-left:4px}
.s-fav-btn{
  background:none;border:none;cursor:pointer;font-size:15px;padding:4px;
  flex-shrink:0;opacity:.4;transition:opacity .2s,transform .2s;line-height:1;
}
.s-fav-btn:hover{opacity:1;transform:scale(1.2)}
.s-fav-btn.saved{opacity:1}
.s-empty{padding:20px 16px;font-size:14px;color:#6b7280;text-align:center}
.s-empty small{display:block;font-size:12px;color:#9ca3af;margin-top:4px}

/* ── HUD pills ── */
#hud{
  position:absolute;top:78px;left:50%;transform:translateX(-50%);
  display:none;flex-wrap:wrap;justify-content:center;gap:6px;z-index:1000;
}
.pill{
  background:rgba(15,23,42,.82);backdrop-filter:blur(16px);
  border:1px solid rgba(251,191,36,.35);border-radius:24px;
  padding:5px 14px;font-size:12px;color:#fbbf24;font-weight:600;letter-spacing:.3px;
  box-shadow:0 2px 12px rgba(0,0,0,.35);white-space:nowrap;
}
.pill b{color:#fff}

/* ── Control buttons ── */
#ctrl{
  position:absolute;right:12px;bottom:120px;
  display:flex;flex-direction:column;gap:8px;z-index:1000;
}
.mb{
  width:48px;height:48px;
  background:rgba(255,255,255,.96);backdrop-filter:blur(18px);
  border:2px solid rgba(251,191,36,.5);border-radius:14px;
  color:#111827;font-size:19px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 16px rgba(0,0,0,.25);transition:all .2s ease;
  user-select:none;font-weight:700;
}
.mb:hover{background:#fef3c7;border-color:#fbbf24;transform:scale(1.06)}
.mb:active{transform:scale(.94)}
.mb.active{background:#1e40af;border-color:#3b82f6;color:#fff;box-shadow:0 6px 20px rgba(30,64,175,.4)}
.mb.danger-active{background:#dc2626;border-color:#dc2626;color:#fff}
#zoom-box{display:flex;flex-direction:column;gap:0}
#zoom-in{border-radius:13px 13px 4px 4px;border-bottom:1px solid rgba(251,191,36,.2)}
#zoom-out{border-radius:4px 4px 13px 13px}
#layer-label{font-size:11px;color:#fbbf24;text-align:center;padding:4px 8px;margin:4px auto 0;border-radius:14px;background:rgba(15,23,42,.9);border:1px solid rgba(251,191,36,.25);min-width:78px;max-width:96px;line-height:1.2}

/* ── Speed card ── */
#speed-card{
  position:absolute;left:12px;bottom:120px;z-index:1000;
  background:rgba(15,23,42,.9);backdrop-filter:blur(18px);
  border:2px solid rgba(251,191,36,.4);border-radius:14px;
  padding:11px 16px;text-align:center;display:none;min-width:76px;
  box-shadow:0 4px 16px rgba(0,0,0,.35);
}
#speed-val{font-size:30px;font-weight:800;color:#fbbf24;line-height:1;letter-spacing:-1px}
#speed-unit{font-size:10px;color:rgba(255,255,255,.6);margin-top:3px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
#speed-bar{width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:8px;overflow:hidden}
#speed-fill{height:100%;background:#fbbf24;border-radius:2px;width:0%;transition:width .5s ease}

/* ── ETA card (shows during nav) ── */
#eta-card{
  position:absolute;left:12px;bottom:120px;z-index:1001;
  background:rgba(15,23,42,.95);backdrop-filter:blur(18px);
  border:2px solid rgba(59,130,246,.4);border-radius:14px;
  padding:10px 14px;display:none;min-width:100px;
  box-shadow:0 4px 16px rgba(0,0,0,.35);
}
#eta-time{font-size:22px;font-weight:800;color:#60a5fa;line-height:1}
#eta-label{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
#eta-remain{font-size:12px;color:rgba(255,255,255,.7);margin-top:6px;font-weight:600}

/* ── Route panel ── */
#route-panel{
  position:absolute;bottom:0;left:0;right:0;z-index:1000;display:none;
}
#rp-header{
  background:rgba(255,255,255,.99);backdrop-filter:blur(24px);
  border-top:3px solid #fbbf24;border-radius:24px 24px 0 0;
  padding:16px 18px 14px;box-shadow:0 -6px 24px rgba(0,0,0,.2);
}
#rp-drag{width:32px;height:4px;background:#d1d5db;border-radius:2px;margin:0 auto 12px}
#rp-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
#rp-dest{flex:1;color:#111827;font-size:15px;font-weight:700;line-height:1.35;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
#rp-stats{display:flex;gap:12px;flex-shrink:0;padding-top:2px}
.stat{text-align:center;min-width:46px}
.stat-v{font-size:20px;font-weight:800;color:#1e40af;line-height:1}
.stat-u{font-size:10px;color:#6b7280;margin-top:2px;font-weight:600;text-transform:uppercase}
#rp-btns{display:flex;gap:8px}
#btn-go{
  flex:1;background:linear-gradient(135deg,#1e40af 0%,#1d4ed8 100%);border:none;border-radius:13px;
  color:#fff;font-size:14px;font-weight:800;padding:13px 0;cursor:pointer;
  transition:all .2s;letter-spacing:.04em;text-transform:uppercase;
  box-shadow:0 4px 12px rgba(30,64,175,.35);font-family:'Outfit',sans-serif;
}
#btn-go:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(30,64,175,.5)}
#btn-go:active{transform:scale(.97)}
#btn-fav-dest{
  background:#fff;border:2px solid #fbbf24;border-radius:13px;
  color:#374151;font-size:18px;padding:12px 14px;cursor:pointer;transition:all .2s;
}
#btn-fav-dest:hover{background:#fef3c7}
#btn-fav-dest.saved{background:#fef3c7;border-color:#f59e0b}
#btn-cancel{
  background:#f9fafb;border:2px solid #e5e7eb;border-radius:13px;
  color:#374151;font-size:13px;padding:12px 16px;cursor:pointer;font-weight:700;
  font-family:'Outfit',sans-serif;transition:all .2s;
}
#btn-cancel:hover{background:#f1f5f9}

#steps-list{
  background:#fff;max-height:190px;overflow-y:auto;
  border-top:1px solid rgba(226,232,240,.8);
}
.step{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid rgba(241,245,249,.9)}
.step:last-child{border-bottom:none}
.step-ic{
  width:32px;height:32px;border-radius:50%;flex-shrink:0;
  background:rgba(30,64,175,.12);border:1.5px solid rgba(96,165,250,.2);
  display:flex;align-items:center;justify-content:center;font-size:14px;
}
.step-instr{font-size:13px;color:#111827;line-height:1.4;font-weight:500}
.step-d{font-size:11px;color:#6b7280;margin-top:2px;font-weight:500}

/* ── Nav bar ── */
#nav-bar{
  position:absolute;top:0;left:0;right:0;z-index:1001;
  background:linear-gradient(90deg,#1e3a8a 0%,#1e40af 100%);
  padding:14px 16px;display:none;align-items:center;gap:14px;
  box-shadow:0 6px 24px rgba(30,58,138,.5);animation:slideInDown .35s ease;
}
@keyframes slideInDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
#nav-ic{font-size:26px;flex-shrink:0;line-height:1}
#nav-instr{flex:1;color:#fff;font-size:15px;font-weight:700;line-height:1.3}
#nav-dist{color:rgba(255,255,255,.7);font-size:13px;font-weight:600;flex-shrink:0;white-space:nowrap}

#btn-end{
  position:absolute;top:80px;left:12px;z-index:1001;
  background:rgba(220,38,38,.9);backdrop-filter:blur(16px);
  border:none;border-radius:12px;
  color:#fff;font-size:13px;font-weight:700;
  padding:9px 14px;cursor:pointer;display:none;
  box-shadow:0 4px 16px rgba(220,38,38,.4);font-family:'Outfit',sans-serif;
}
#btn-end:hover{background:#b91c1c}

/* ── Toast ── */
#toast{
  position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
  background:rgba(15,23,42,.97);backdrop-filter:blur(20px);
  border:1.5px solid rgba(251,191,36,.4);border-radius:24px;
  padding:12px 24px;color:#fbbf24;font-size:13px;font-weight:700;
  z-index:5000;pointer-events:none;opacity:0;
  transition:opacity .25s ease;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.4);letter-spacing:.3px;
}

/* ── Favorites panel ── */
#fav-panel{
  position:absolute;bottom:0;left:0;right:0;z-index:1050;
  background:#fff;border-radius:24px 24px 0 0;
  box-shadow:0 -8px 32px rgba(0,0,0,.3);
  display:none;max-height:60vh;flex-direction:column;animation:slideUp .3s ease;
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
#fav-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 12px;border-bottom:1px solid #f1f5f9;
}
#fav-header h3{font-size:16px;font-weight:800;color:#111827}
#fav-close{background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280;line-height:1}
#fav-list{overflow-y:auto;flex:1}
.fav-item{
  display:flex;align-items:center;gap:12px;padding:12px 18px;
  border-bottom:1px solid #f8fafc;cursor:pointer;transition:background .15s;
}
.fav-item:hover{background:#f8fafc}
.fav-icon{font-size:20px;flex-shrink:0}
.fav-text{flex:1;overflow:hidden}
.fav-name{font-size:14px;font-weight:700;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-addr{font-size:12px;color:#6b7280;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-del{background:none;border:none;cursor:pointer;color:#fca5a5;font-size:14px;padding:4px;line-height:1;
  border-radius:6px;transition:color .2s;flex-shrink:0}
.fav-del:hover{color:#dc2626}
#fav-empty{padding:32px 20px;text-align:center;color:#9ca3af;font-size:14px}

/* ── Nearby POI panel ── */
#nearby-panel{
  position:absolute;left:12px;top:80px;z-index:1000;
  display:flex;flex-direction:column;gap:6px;
}
.nearby-btn{
  background:rgba(15,23,42,.88);backdrop-filter:blur(16px);
  border:1.5px solid rgba(251,191,36,.3);border-radius:12px;
  color:#fbbf24;font-size:12px;font-weight:700;
  padding:7px 12px;cursor:pointer;white-space:nowrap;
  transition:all .2s;display:flex;align-items:center;gap:6px;
  font-family:'Outfit',sans-serif;box-shadow:0 2px 12px rgba(0,0,0,.3);
}
.nearby-btn:hover{background:rgba(251,191,36,.2);border-color:#fbbf24}

/* ── Map scale indicator ── */
#scale-box{
  position:absolute;left:12px;bottom:84px;z-index:1000;
  background:rgba(15,23,42,.8);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.15);border-radius:8px;
  padding:4px 10px;font-size:11px;color:rgba(255,255,255,.7);font-weight:600;
}

/* ── User location marker ── */
.u-marker-wrap{
  position:relative;
  width:48px;height:48px;
  display:flex;align-items:center;justify-content:center;
}
/* Accuracy halo — rendered separately as L.circle, this is just backup */
.u-dot{
  width:18px;height:18px;background:#3b82f6;border-radius:50%;
  border:3px solid #fff;box-shadow:0 0 0 5px rgba(59,130,246,.2),0 2px 10px rgba(0,0,0,.4);
  position:relative;z-index:2;flex-shrink:0;
}
/* Directional cone — shown when heading known */
.u-cone{
  position:absolute;
  top:0;left:50%;
  transform-origin:bottom center;
  width:0;height:0;
  border-left:9px solid transparent;
  border-right:9px solid transparent;
  border-bottom:22px solid rgba(59,130,246,.55);
  margin-left:-9px;
  top:-18px;
  filter:blur(1px);
  transition:transform .3s ease;
}
/* Full SVG arrow marker (used when heading available) */
.u-arrow-svg{
  width:44px;height:44px;
  transition:transform .35s cubic-bezier(.25,.46,.45,.94);
  transform-origin:center center;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.35));
}

/* ── Leaflet tweaks ── */
.leaflet-control-zoom{display:none}
.leaflet-control-attribution{font-size:10px;opacity:.6;background:rgba(15,23,42,.7)!important;color:rgba(255,255,255,.5)!important;padding:2px 6px;border-radius:6px}
.leaflet-control-attribution a{color:rgba(255,255,255,.5)!important}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:999px}
::-webkit-scrollbar-track{background:transparent}

/* ── Pulse animation for destination marker ── */
@keyframes markerPop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.dest-marker{animation:markerPop .3s ease}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <h2>ERBIL NAVIGATOR</h2>
  <p id="load-msg">Acquiring GPS signal…</p>
</div>

<!-- Nav overlay -->
<div id="nav-bar">
  <div id="nav-ic">🗺️</div>
  <div id="nav-instr">Follow route…</div>
  <div id="nav-dist"></div>
</div>
<button id="btn-end" onclick="endNav()">✕ END NAV</button>

<!-- Search -->
<div id="search-panel">
  <div id="search-box">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search-input" type="search" placeholder="Search places in Kurdistan…" autocomplete="off" spellcheck="false" inputmode="search">
    <button id="voice-btn" title="Voice search" onclick="startVoice()">🎤</button>
    <button id="clear-btn" onclick="clearSearch()" title="Clear">✕</button>
  </div>
  <div id="suggestions"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="pill">🛰️ <b id="h-acc">—</b></div>
  <div class="pill">📍 <b id="h-coord">acquiring…</b></div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Compass rose (shown during nav) -->
<!-- compass/head-up UI removed (first-person mode disabled) -->



<!-- Nearby quick-access -->
<div id="nearby-panel" style="display:none">
  <button class="nearby-btn" onclick="searchNearby('hospital')">🏥 Hospitals</button>
  <button class="nearby-btn" onclick="searchNearby('fuel')">⛽ Fuel</button>
  <button class="nearby-btn" onclick="searchNearby('restaurant')">🍽️ Food</button>
  <button class="nearby-btn" onclick="searchNearby('atm')">🏦 ATMs</button>
</div>

<!-- Controls -->
<div id="ctrl">
  <button class="mb" id="btn-locate" title="My location" onclick="goToMe()">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    </svg>
  </button>
  <button class="mb" id="btn-follow" title="Follow GPS" onclick="toggleFollow()">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="3 11 22 2 13 21 11 13 3 11"/>
    </svg>
  </button>
  <button class="mb" id="btn-layer" title="Switch map mode" onclick="cycleLayer()">
    <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 2 7 12 12 22 7 12 2"/>
      <polyline points="2 17 12 22 22 17"/>

var searchTimer = null, toastTimer = null, lastRecalc = 0;
var routeStartTime = null, routeTotalDist = 0;
var recognition = null;
var FAVS_KEY = 'krd_gps_favs';
var currentSearchQ = '';

// Heading / compass
var deviceHeading = null;
var gpsHeading    = null;
var headingMode   = 'none';
var mapRotation   = 0;
var rotateMap     = false;
var lastHeadingApplied = null;
var orientationGranted = false;

// ─── Tile layers ───
var tileLayers = {
  streets: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

// ─── Init ───
window.addEventListener('DOMContentLoaded', function() {
  map = L.map('map', {

// Keep rotated panes anchored when map moves/zooms
function _updatePaneOriginsIfRotated() {
  if (!map || !mapRotation) return;
  var center = map.getSize().divideBy(2);
  ['tilePane','overlayPane','shadowPane'].forEach(function(name) {
    var p = map.getPanes()[name];
    if (p) p.style.transformOrigin = center.x + 'px ' + center.y + 'px';
  });
}

// ─── GPS & Orientation ───
function initGPS() {
  if (!navigator.geolocation) { toast('Geolocation not supported'); return; }
  navigator.geolocation.watchPosition(onPos, onPosErr, {
    enableHighAccuracy:true, maximumAge:500, timeout:15000
  });
  initOrientation();
}

function initOrientation() {
  // Orientation/compass support intentionally disabled to avoid first-person mode bugs
  orientationGranted = false;
}

function requestOrientationPermission() {
  // Compass/heading permission removed — feature disabled
  toast('Compass removed');
}

// Smooth heading with low-pass filter
var _smoothHeading = null;
function smoothHeading(newH) {
  if (_smoothHeading === null) { _smoothHeading = newH; return newH; }
  // Handle 360→0 wrap
  var diff = newH - _smoothHeading;
  if (diff > 180) diff -= 360;
  if (diff < -180) diff += 360;
  _smoothHeading = (_smoothHeading + diff * 0.25 + 360) % 360;
  return _smoothHeading;
}

function onOrientation(e) {
  // Orientation handling disabled
  return;
}

function applyHeading(heading) {
  if (heading === null || isNaN(heading)) return;
  // Throttle to every 50ms
  var now = Date.now();
  if (lastHeadingApplied && now - lastHeadingApplied < 50) return;
  lastHeadingApplied = now;

  updateUserMarkerArrow(heading);

  // Rotate map during nav or follow mode
  if ((navMode || followMode) && rotateMap && myLat !== null) {
    rotateMapToHeading(heading);
  }
}

function updateUserMarkerArrow(heading) {
  if (!userMarker) return;
  var el = userMarker.getElement();
  if (!el) return;
  var svg = el.querySelector('.u-arrow-svg');
  var dot = el.querySelector('.u-dot-inner');
  if (svg) {
    svg.style.transform = 'rotate('+heading+'deg)';
  }
}

function rotateMapToHeading(heading) {
  // Leaflet doesn't natively rotate, so we rotate the tile pane CSS
  mapRotation = heading;
  var tilePane = map.getPanes().tilePane;
  var overlayPane = map.getPanes().overlayPane;
  var shadowPane = map.getPanes().shadowPane;
  var center = map.getSize().divideBy(2);
  [tilePane, overlayPane, shadowPane].forEach(function(p) {
    if (!p) return;
    p.style.transformOrigin = center.x + 'px ' + center.y + 'px';
    p.style.transform = 'rotate('+(-heading)+'deg)';
  });
  // Compass rose indicator
  updateCompassRose(heading);
}

function updateCompassRose(heading) {
  // Compass UI removed — nothing to update
  return;
}

function resetMapRotation() {
  mapRotation = 0;
  _smoothHeading = null;
  var panes = ['tilePane','overlayPane','shadowPane'];
  panes.forEach(function(name) {
    var p = map.getPanes()[name];
    if (p) {
      p.style.transform = '';
      p.style.transformOrigin = '';
    }
  });
  updateCompassRose(0);
  // Make sure interactions are back to normal
  if (map && map.dragging) map.dragging.enable();
  if (map && map.doubleClickZoom) map.doubleClickZoom.enable();
  if (map && map.boxZoom) map.boxZoom.enable();
}

function toggleRotateMap() {
  // Head-up / first-person mode removed. Keep map normal.
  rotateMap = false;
  resetMapRotation();
  if (map && map.dragging) map.dragging.enable();
  if (map && map.doubleClickZoom) map.doubleClickZoom.enable();
  if (map && map.boxZoom) map.boxZoom.enable();
  toast('Head-up mode removed');
}

function onPos(p) {
  var lat = p.coords.latitude, lon = p.coords.longitude;
  var acc = p.coords.accuracy, spd = p.coords.speed;
  var hdg = p.coords.heading;
  myLat = lat; myLon = lon;

  // GPS heading (only reliable when moving >5 km/h)
  var kmh = spd ? Math.round(spd * 3.6) : 0;
  if (hdg !== null && !isNaN(hdg) && kmh > 5) {
    gpsHeading = hdg;
    if (headingMode !== 'compass') {
      headingMode = 'gps';
      applyHeading(smoothHeading(hdg));
    }
  }

  // HUD
  document.getElementById('hud').style.display = route || navMode ? 'none' : 'flex';
  document.getElementById('h-acc').textContent = Math.round(acc) + 'm';
  document.getElementById('h-coord').textContent = lat.toFixed(5) + ', ' + lon.toFixed(5);

  // Speed
  document.getElementById('speed-val').textContent = kmh;
  document.getElementById('speed-fill').style.width = Math.min(kmh / 120 * 100, 100) + '%';
  if (!navMode) document.getElementById('speed-card').style.display = 'block';

  var ll = [lat, lon];
  if (!userMarker) {
    var markerHtml = buildUserMarkerHtml(null);
    userMarker = L.marker(ll, {
      icon: L.divIcon({html: markerHtml, iconSize:[44,44], iconAnchor:[22,22], className:''}),
      zIndexOffset:1000
    }).addTo(map);
    accCircle = L.circle(ll, {
      radius: acc, color: '#3b82f6', weight: 1.5, fillColor: '#3b82f6', fillOpacity: .08
    }).addTo(map);
    if (followMode) map.setView(ll, 16);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('nearby-panel').style.display = 'flex';
    if (!orientationGranted) requestOrientationPermission();
  } else {
    userMarker.setLatLng(ll);
    accCircle.setLatLng(ll).setRadius(acc);
    if (followMode && !navMode) map.panTo(ll, {animate:true,duration:0.4});
    if (navMode && followMode) map.setView(ll, 18, {animate:true,duration:0.4});
  }

  if (navMode && route) checkNavProgress(lat, lon);
  updateETA();
}

function buildUserMarkerHtml(heading) {

      : '')

    +'<circle cx="22" cy="22" r="9" fill="#3b82f6" stroke="#fff" stroke-width="3"/>'

    +'</svg>';
}

function cycleLayer() {

function safeZoomIn(){ if (typeof map !== 'undefined' && map) map.zoomIn(); }
function safeZoomOut(){ if (typeof map !== 'undefined' && map) map.zoomOut(); }

// ─── Phonetic / Fuzzy search helpers ───
function normalize(s) {
  return s.toLowerCase()
    .replace(/[\u0600-\u06FF\u0750-\u077F]/g, function(c){ return c; })
    .replace(/[^a-z0-9\u0600-\u06FF\u0750-\u077F ]/g,'')
    .replace(/\s+/g,' ').trim();
}

// Phonetic collapse: map common sound-alikes to canonical forms
// This makes "majdi" match "majidi", "resturant" match "restaurant", etc.
function phonetic(s) {
  return s
    .toLowerCase()
    // Vowel collapsing — treat all vowels as interchangeable
    .replace(/[aeiou]+/g, 'a')
    // Common consonant pairs
    .replace(/ck/g,'k').replace(/ph/g,'f').replace(/gh/g,'g')
    .replace(/qu/g,'k').replace(/x/g,'ks')
    // Remove repeated chars: "majjidi" → "majidi"
    .replace(/(.)\1+/g,'$1')
    // Remove trailing s (simple singular/plural)
    .replace(/s$/,'')
    .trim();
}

// Edit distance (Levenshtein) — for catching 1-2 char typos
function editDistance(a, b) {
  var m=a.length, n=b.length;
  if (m===0) return n; if (n===0) return m;
  var dp=[];
  for (var i=0;i<=m;i++){ dp[i]=[i]; }
  for (var j=0;j<=n;j++){ dp[0][j]=j; }
  for (var i=1;i<=m;i++){
    for (var j=1;j<=n;j++){
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1]
        : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[m][n];
}

// Token-level edit distance: split into words, find best word-pair matches
function tokenEditScore(query, target) {
  var qw = normalize(query).split(' ').filter(Boolean);
  var tw = normalize(target).split(' ').filter(Boolean);
  var total = 0;
  qw.forEach(function(qword) {
    var best = Infinity;
    tw.forEach(function(tword) {
      var d = editDistance(qword, tword);
      var maxLen = Math.max(qword.length, tword.length);
      // Also try with phonetic collapse
      var pd = editDistance(phonetic(qword), phonetic(tword));
      best = Math.min(best, d, pd);
    });
    // Score based on how close the match is relative to word length
    var maxLen = Math.max(qword.length, 3);
    var similarity = Math.max(0, 1 - best / maxLen);
    total += similarity;
  });
  return qw.length > 0 ? total / qw.length : 0;
}

function fuzzyScore(query, target, distKm) {
  var q = normalize(query), t = normalize(target);
  var score = 0;

  // 1. Exact substring match (highest priority)
  if (t.indexOf(q) !== -1) score = 200;
  else {
    // 2. Phonetic match
    var pq = phonetic(q), pt = phonetic(t);
    if (pt.indexOf(pq) !== -1) score = 150;
    else {
      // 3. Token-level fuzzy (handles missing chars, typos, missing vowels)
      var tokenSim = tokenEditScore(query, target);
      score = tokenSim * 100;
    }
  }

  // 4. Distance bonus — closer results should rank much higher
  if (distKm !== undefined && distKm !== null && !isNaN(distKm)) {
    var distBonus = Math.round(84 - distKm * 2.5);
    if (distKm < 3) distBonus += 18;
    if (distKm < 1) distBonus += 10;
    score += distBonus;
  }

  // 5. Prefer results that start with the query
  if (t.startsWith(q)) score += 30;
  if (phonetic(t).startsWith(phonetic(q))) score += 15;

  return score;
}

// Highlight matched characters in name
function highlight(name, query) {
  if (!query) return esc(name);
  var q = normalize(query);
  var n = name.toLowerCase();
  var idx = n.indexOf(q);
  if (idx !== -1) {
    return esc(name.slice(0,idx)) +
      '<mark>'+esc(name.slice(idx,idx+q.length))+'</mark>' +
      esc(name.slice(idx+q.length));
  }
  return esc(name);
}

// ─── Search ───
var activeCategory = '';
var searchCategories = [
  {id:'',label:'All'},
  {id:'amenity=hospital',label:'🏥 Hospitals'},
  {id:'amenity=restaurant',label:'🍽️ Food'},
  {id:'amenity=fuel',label:'⛽ Fuel'},
  {id:'amenity=bank',label:'🏦 Banks'},
  {id:'tourism=hotel',label:'🏨 Hotels'},
  {id:'amenity=school',label:'🎓 Schools'},
];

function handleSearchInput(e) {
  var q = e.target.value.trim();
  currentSearchQ = q;
  document.getElementById('clear-btn').style.display = q ? 'flex' : 'none';
  clearTimeout(searchTimer);
  if (q.length < 1) { hideSugg(); return; }
  if (q.length > 100) return;
  searchTimer = setTimeout(function() { doSearch(q); }, 400);
}

async function doSearch(q) {
  var favResults = searchFavs(q);
  showLoadingState();
  try {
    var queries = buildQueryVariants(q);
    var allResults = [];
    var seen = new Set();

    for (var i=0; i<queries.length; i++) {
      var params = new URLSearchParams({
        q: queries[i],
        format:'json', limit:12,
        countrycodes:'iq,tr,ir,sy',
        viewbox:'38.5,37.8,46.5,29.0',
        bounded:'0',
        addressdetails:'1', namedetails:'1',
        'accept-language':'en,ku,ar'
      });
      // Bias search toward user's location if we have it
      if (myLat !== null) {
        params.set('lat', myLat.toFixed(5));
        params.set('lon', myLon.toFixed(5));
      }
      var res = await fetch('https://nominatim.openstreetmap.org/search?'+params);
      if (!res.ok) continue;
      var data = await res.json();
      data.forEach(function(r) {
        if (!seen.has(r.place_id)) {
          seen.add(r.place_id);
          allResults.push(r);
        }
      });
      // If first query returned solid results, don't need more queries
      if (i === 0 && allResults.length >= 5) break;
    }

    // Score with distance awareness
    allResults.forEach(function(r) {
      var name = (r.namedetails&&r.namedetails.name) ? r.namedetails.name : r.display_name.split(',')[0];
      r._name = name;
      var lat = parseFloat(r.lat), lon = parseFloat(r.lon);
      r._distKm = myLat !== null ? haversine(myLat, myLon, lat, lon) / 1000 : null;
      // Score against both name and full display_name, take best
      var s1 = fuzzyScore(q, name, r._distKm);
      var s2 = fuzzyScore(q, r.display_name, r._distKm) * 0.7;
      r._score = Math.max(s1, s2);
    });

    // Filter out very low scores (irrelevant results)
    allResults = allResults.filter(function(r){ return r._score > 15; });
    allResults.sort(function(a,b){
      if (Math.abs(b._score - a._score) < 10 && a._distKm !== null && b._distKm !== null) {
        return a._distKm - b._distKm;
      }
      return b._score - a._score;
    });

    renderSugg(allResults, favResults, q);
  } catch(err) {
    hideSugg();
    toast('Search unavailable — check connection');
  }
}

function buildQueryVariants(q) {
  var variants = [q];

  // Strip accents/diacritics
  var loose = q.normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if (loose !== q) variants.push(loose);

  // Deduplicate repeated letters ("majjidi" → "majidi")
  var dedup = q.replace(/(.)\1+/g,'$1');
  if (dedup !== q && !variants.includes(dedup)) variants.push(dedup);

  // Common spelling corrections for local place names and typos
  var spellingFixes = {
    majdi: 'majidi',
    majidi: 'majdi',
    resturant: 'restaurant',
    restraunt: 'restaurant',
    restuarant: 'restaurant',
    mosk: 'mosque',
    mosqe: 'mosque',
    erbil: 'hawler',
    sulaymaniyah: 'sulaymani',
    sherwani: 'sharwani',
    malkana: 'makana'
  };
  var words = q.split(' ');
  words.forEach(function(w, idx) {
    var fixed = spellingFixes[w.toLowerCase()];
    if (fixed) {
      var copy = words.slice();
      copy[idx] = fixed;
      var alt = copy.join(' ');
      if (!variants.includes(alt)) variants.push(alt);
    }
  });

  // Add vowel-restored variants for consonant-heavy words
  var expanded = words.map(function(w) {
    var vowelCount = (w.match(/[aeiou]/gi)||[]).length;
    if (w.length >= 4 && vowelCount === 0) {
      return w.replace(/([^aeiou\s])([^aeiou\s])/gi, '$1i$2');
    }
    return w;
  }).join(' ');
  if (expanded !== q && !variants.includes(expanded)) variants.push(expanded);

  return variants.filter(function(v,i,a){ return a.indexOf(v)===i && v.length > 0; });
}

function searchFavs(q) {
  var favs = getFavs();
  var norm = normalize(q);
  return favs.filter(function(f) {
    var distKm = myLat!==null ? haversine(myLat,myLon,f.lat,f.lon)/1000 : null;
    return fuzzyScore(q, f.name, distKm) > 20 || normalize(f.name).indexOf(norm) !== -1;
  });
}

function showLoadingState() {
  var box = document.getElementById('suggestions');
  if (box.style.display === 'none') {
    box.innerHTML = '<div class="s-empty">Searching…</div>';
    box.style.display = 'block';
  }
}

function renderSugg(results, favResults, q) {
  var box = document.getElementById('suggestions');
  var html = '';

  // Category pills
  html += '<div id="search-cats">';
  searchCategories.forEach(function(cat) {
    html += '<div class="cat-pill'+(activeCategory===cat.id?' active':'') +
      '" onclick="setCategory(\''+cat.id+'\')">'+cat.label+'</div>';
  });
  html += '</div>';

  // Favorites matches
  if (favResults.length) {
    html += '<div class="s-section-label">⭐ Saved Places</div>';
    favResults.forEach(function(f) {
      html += buildSuggItem(f.lat, f.lon, f.name, f.name, f.addr||'', '⭐', q, true, f.id);
    });
  }

  if (!results || !results.length) {
    if (!favResults.length) {
      html += '<div class="s-empty">No results found<small>Try a different spelling or nearby city name</small></div>';
    }
    box.innerHTML = html;
    box.style.display = 'block';
    attachSuggHandlers();
    return;
  }

  if (results.length) {
    html += '<div class="s-section-label">📍 Places</div>';
  }

  results.slice(0,10).forEach(function(r) {
    var name = r._name || r.display_name.split(',')[0];
    var addr = r.display_name.split(',').slice(1,3).join(', ');
    var icon = placeIcon(r.type, r.class);
    var lat = parseFloat(r.lat), lon = parseFloat(r.lon);
    var dist = r._distKm !== null ? r._distKm : (myLat!==null ? haversine(myLat,myLon,lat,lon)/1000 : null);
    var distStr = dist!==null ? (dist>=1?(dist).toFixed(1)+' km':Math.round(dist*1000)+' m') : '';
    html += buildSuggItem(lat, lon, name, r.display_name, addr, icon, q, false, '', distStr);
  });

  box.innerHTML = html;
  box.style.display = 'block';
  hideHudIfNoRoute();
  attachSuggHandlers();
}

function buildSuggItem(lat, lon, name, fullName, addr, icon, q, isFav, favId, dist) {
  var distHtml = dist ? '<span class="s-dist">'+esc(dist)+'</span>' : '';
  var favHtml = isFav
    ? '<button class="s-fav-btn saved" data-fav-del="'+favId+'" title="Remove">❤️</button>'
    : '<button class="s-fav-btn" data-fav-add data-lat="'+lat+'" data-lon="'+lon+'" data-name="'+encodeURIComponent(name)+'" data-addr="'+encodeURIComponent(addr)+'" title="Save">🤍</button>';
  return '<div class="s-item" data-lat="'+lat+'" data-lon="'+lon+'" data-name="'+encodeURIComponent(fullName)+'">'
    + '<div class="s-icon">'+icon+'</div>'
    + '<div class="s-text"><div class="s-name">'+highlight(name,q)+'</div>'
    + '<div class="s-addr">'+esc(addr)+'</div></div>'
    + distHtml + favHtml + '</div>';
}

function attachSuggHandlers() {
  document.querySelectorAll('.s-item').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (e.target.closest('.s-fav-btn')) return;
      pickPlace(parseFloat(el.dataset.lat), parseFloat(el.dataset.lon), decodeURIComponent(el.dataset.name));
    });
  });
  document.querySelectorAll('[data-fav-add]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      saveFav({
        id: Date.now(),
        lat: parseFloat(btn.dataset.lat),
        lon: parseFloat(btn.dataset.lon),
        name: decodeURIComponent(btn.dataset.name),
        addr: decodeURIComponent(btn.dataset.addr)
      });
      btn.textContent = '❤️';
      btn.classList.add('saved');
      toast('Saved to favorites');
    });
  });
  document.querySelectorAll('[data-fav-del]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      deleteFav(parseInt(btn.dataset.favDel));
      var q = document.getElementById('search-input').value.trim();
      if (q) doSearch(q); else hideSugg();
      toast('Removed from favorites');
    });
  });
}

function setCategory(catId) {
  activeCategory = catId;
  var q = document.getElementById('search-input').value.trim();
  if (catId && !q) {
    var catName = searchCategories.find(function(c){ return c.id===catId; });
    if (catName) {
      document.getElementById('search-input').value = catName.label.replace(/[^\w\s]/gi,'').trim();
      document.getElementById('clear-btn').style.display = 'flex';
    }
  }
  if (q || catId) doSearch(q || catId.split('=')[1] || '');
}

function hideSugg() {
  document.getElementById('suggestions').style.display='none';
  showHudIfNoRoute();
}
function clearSearch() {
  document.getElementById('search-input').value='';
  document.getElementById('clear-btn').style.display='none';
  currentSearchQ='';
  hideSugg();
}
function hideHudIfNoRoute() {
  if (!route && !navMode) document.getElementById('hud').style.display='none';
}
function showHudIfNoRoute() {
  if (!route && !navMode) document.getElementById('hud').style.display='flex';
}

function placeIcon(type, cls) {
  var t=(type||'').toLowerCase(), c=(cls||'').toLowerCase();
  if (t==='hospital'||t==='clinic'||t==='doctors') return '🏥';
  if (t==='school'||t==='university'||t==='college') return '🎓';
  if (t==='mosque'||t==='place_of_worship') return '🕌';
  if (t==='church') return '⛪';
  if (t==='restaurant'||t==='fast_food'||t==='food_court') return '🍽️';
  if (t==='cafe'||t==='coffee') return '☕';
  if (t==='hotel'||t==='hostel'||t==='motel') return '🏨';
  if (t==='fuel'||t==='gas_station') return '⛽';
  if (t==='bank'||t==='atm') return '🏦';
  if (t==='supermarket'||t==='marketplace'||t==='mall'||t==='convenience') return '🛒';
  if (t==='airport'||t==='aerodrome') return '✈️';
  if (t==='bus_station'||t==='bus_stop') return '🚌';
  if (t==='park'||t==='garden'||t==='nature_reserve') return '🌳';
  if (t==='pharmacy') return '💊';
  if (t==='police') return '👮';
  if (t==='fire_station') return '🚒';
  if (t==='cinema'||t==='theatre') return '🎭';
  if (t==='stadium'||t==='sports_centre') return '🏟️';
  if (t==='museum') return '🏛️';
  if (c==='highway') return '🛣️';
  if (c==='boundary'||t==='administrative') return '🏙️';
  if (c==='natural') return '⛰️';
  if (c==='waterway') return '🌊';
  return '📍';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Voice Search ───
function startVoice() {
  var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { toast('Voice search not supported in this browser'); return; }
  if (!recognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onresult = function(e) {
      var text = e.results[0][0].transcript;
      document.getElementById('search-input').value = text;
      document.getElementById('clear-btn').style.display = 'flex';
      document.getElementById('voice-btn').classList.remove('listening');
      doSearch(text);
    };
    recognition.onerror = function() {
      document.getElementById('voice-btn').classList.remove('listening');
      toast('Voice search failed — try again');
    };
    recognition.onend = function() {
      document.getElementById('voice-btn').classList.remove('listening');
    };
  }
  document.getElementById('voice-btn').classList.add('listening');
  recognition.start();
  toast('Listening… speak a place name');
}

// ─── Nearby POI search ───
async function searchNearby(type) {
  if (myLat===null) { toast('Waiting for GPS signal…'); return; }
  hideSugg();
  var radius = 3000;
  var q = type + ' near me';
  document.getElementById('search-input').value = type;
  document.getElementById('clear-btn').style.display = 'flex';
  currentSearchQ = type;
  try {
    var params = new URLSearchParams({
      q: type,
      format:'json', limit:10,
      countrycodes:'iq',
      viewbox: (myLon-0.05)+','+(myLat+0.05)+','+(myLon+0.05)+','+(myLat-0.05),
      bounded:'1',
      addressdetails:'1', namedetails:'1',
      'accept-language':'en,ku,ar'
    });
    var res = await fetch('https://nominatim.openstreetmap.org/search?'+params);
    var data = await res.json();
    data.forEach(function(r){ r._name = (r.namedetails&&r.namedetails.name)?r.namedetails.name:r.display_name.split(',')[0]; });
    toast('Found '+(data.length||0)+' nearby '+type+' locations');
    renderSugg(data, [], type);
  } catch(e) { toast('Nearby search failed'); }
}

// ─── Reverse geocode (long-press) ───
async function reverseGeocode(lat, lon) {
  try {
    var params = new URLSearchParams({lat:lat,lon:lon,format:'json','accept-language':'en,ku,ar'});
    var res = await fetch('https://nominatim.openstreetmap.org/reverse?'+params);
    var data = await res.json();
    if (data && data.display_name) {
      var name = data.address ? (data.address.road||data.address.suburb||data.address.city||data.display_name.split(',')[0]) : data.display_name.split(',')[0];
      pickPlace(lat, lon, data.display_name);
      toast('Destination set: '+name);
    }
  } catch(e) { toast('Could not identify this location'); }
}

// ─── Pick place & route ───
async function pickPlace(lat, lon, fullName) {
  hideSugg();
  destLat=lat; destLon=lon;
  var parts = fullName.split(',').map(function(v){return v.trim();}).filter(Boolean);
  destLabel = parts.slice(0,3).join(' • ');
  document.getElementById('search-input').value = parts[0];

  if (destMarker) map.removeLayer(destMarker);
  destMarker = L.marker([lat,lon], {
    icon: L.divIcon({
      html:'<div class="dest-marker" style="width:20px;height:20px;background:#ef4444;border-radius:50%;border:3px solid #fff;box-shadow:0 4px 16px rgba(239,68,68,.5)"></div>',
      iconSize:[20,20], iconAnchor:[10,10], className:''
    })
  }).addTo(map);

  map.setView([lat,lon], 15, {animate:true});

  if (myLat!==null) {
    await calcRoute(myLat, myLon, lat, lon);
  } else {
    toast('GPS not locked — showing destination only');
    document.getElementById('route-panel').style.display = 'none';
  }
}

// ─── Routing ───
async function calcRoute(fLat, fLon, tLat, tLon) {
  toast('Calculating route…');
  try {
    var url = 'https://router.project-osrm.org/route/v1/driving/'
      + fLon+','+fLat+';'+tLon+','+tLat
      + '?steps=true&geometries=geojson&overview=full&annotations=false';
    var res = await fetch(url);
    if (!res.ok) throw new Error('HTTP '+res.status);
    var data = await res.json();
    if (!data.routes||!data.routes.length) { toast('No driveable route found'); return; }
    route = data.routes[0];
    routeTotalDist = route.distance;
    drawRoute(route.geometry.coordinates);
    showRoutePanel(route);
  } catch(err) {
    console.error(err);
    toast('Routing unavailable — please try again');
  }
}

function drawRoute(coords) {
  if (routePolyline) map.removeLayer(routePolyline);
  var lls = coords.map(function(c){ return [c[1],c[0]]; });
  // Shadow line
  var shadow = L.polyline(lls, {color:'#000',weight:9,opacity:.12,lineCap:'round',lineJoin:'round'}).addTo(map);
  routePolyline = L.featureGroup([
    shadow,
    L.polyline(lls, {color:'#1d4ed8',weight:6,opacity:.9,lineCap:'round',lineJoin:'round'})
  ]).addTo(map);
  map.fitBounds(routePolyline.getBounds(), {padding:[90,80],maxZoom:16,animate:true});
}

function showRoutePanel(r) {
  var km=(r.distance/1000).toFixed(1);
  var mins=Math.round(r.duration/60);
  document.getElementById('rp-dest').textContent = destLabel;
  document.getElementById('r-dist').textContent = km;
  document.getElementById('r-eta').textContent = mins;

  var steps = r.legs[0].steps;
  document.getElementById('steps-list').innerHTML = steps.map(function(s) {
    var d = s.distance>999 ? (s.distance/1000).toFixed(1)+' km' : Math.round(s.distance)+' m';
    return '<div class="step">'
      +'<div class="step-ic">'+stepIcon(s.maneuver.type,s.maneuver.modifier)+'</div>'
      +'<div><div class="step-instr">'+esc(humanStep(s))+'</div>'
      +'<div class="step-d">'+d+'</div></div></div>';
  }).join('');

  // Check if already favorited
  var favs = getFavs();
  var alreadyFav = favs.some(function(f){ return Math.abs(f.lat-destLat)<0.0001 && Math.abs(f.lon-destLon)<0.0001; });
  document.getElementById('btn-fav-dest').textContent = alreadyFav ? '❤️' : '⭐';
  document.getElementById('btn-fav-dest').classList.toggle('saved', alreadyFav);

  document.getElementById('route-panel').style.display = 'block';
  document.getElementById('hud').style.display = 'none';
}

function cancelRoute() {
  if (routePolyline) { map.removeLayer(routePolyline); routePolyline=null; }
  if (destMarker) { map.removeLayer(destMarker); destMarker=null; }
  document.getElementById('route-panel').style.display='none';
  route=null; destLat=null; destLon=null; navMode=false;
  rotateMap=false;
  resetMapRotation();
  document.getElementById('nav-bar').style.display='none';
  document.getElementById('btn-end').style.display='none';
  document.getElementById('eta-card').style.display='none';
  var _cw=document.getElementById('compass-wrap'); if (_cw) _cw.style.display='none';
  document.getElementById('speed-card').style.display=myLat!==null?'block':'none';
  document.getElementById('hud').style.display='flex';
  clearSearch();
}

// ─── Navigation ───
function startNav() {
  if (!route) return;
  navMode=true; navStep=0; followMode=true; updateFollowBtn();
  routeStartTime = Date.now();
  rotateMap = true;
  document.getElementById('route-panel').style.display='none';
  document.getElementById('hud').style.display='none';
  document.getElementById('speed-card').style.display='none';
  document.getElementById('nav-bar').style.display='flex';
  document.getElementById('btn-end').style.display='block';
  document.getElementById('eta-card').style.display='block';
  var _cw=document.getElementById('compass-wrap'); if (_cw) _cw.style.display='flex';
  renderNavStep(0);
  updateETA();
  if (myLat!==null) map.setView([myLat,myLon],18,{animate:true});
  toast('Navigation started — drive safely!');
}

function renderNavStep(idx) {
  var steps=route.legs[0].steps;
  if (idx>=steps.length) return;
  var s=steps[idx];
  document.getElementById('nav-ic').textContent=stepIcon(s.maneuver.type,s.maneuver.modifier);
  document.getElementById('nav-instr').textContent=humanStep(s);
  var d=s.distance>999?(s.distance/1000).toFixed(1)+' km':Math.round(s.distance)+' m';
  document.getElementById('nav-dist').textContent='In '+d;
}

function updateETA() {
  if (!route || !navMode) return;
  var elapsed = routeStartTime ? (Date.now()-routeStartTime)/1000 : 0;
  var remaining = Math.max(0, route.duration - elapsed);
  var mins = Math.round(remaining/60);
  var eta = new Date(Date.now()+remaining*1000);
  var h=eta.getHours(), m=eta.getMinutes();
  document.getElementById('eta-time').textContent = h+':'+(m<10?'0':'')+m;
  document.getElementById('eta-remain').textContent = (routeTotalDist/1000).toFixed(1)+' km total';
}

function checkNavProgress(lat, lon) {
  if (!route) return;
  var steps=route.legs[0].steps;
  if (navStep>=steps.length-1) return;
  var s=steps[navStep];
  if (!s.maneuver||!s.maneuver.location) return;
  var d=haversine(lat,lon,s.maneuver.location[1],s.maneuver.location[0]);
  if (d<50) {
    navStep++;
    renderNavStep(navStep);
    if (navStep===steps.length-1) toast('🎉 You have arrived!');
  }
  // Off-route detection
  var now=Date.now();
  if (d>150 && now-lastRecalc>15000) {
    lastRecalc=now;
    toast('Recalculating route…');
    calcRoute(lat,lon,destLat,destLon);
  }
}

function endNav() {
  navMode=false;
  rotateMap=false;
  resetMapRotation();
  document.getElementById('nav-bar').style.display='none';
  document.getElementById('btn-end').style.display='none';
  document.getElementById('eta-card').style.display='none';
  document.getElementById('route-panel').style.display='block';
  document.getElementById('speed-card').style.display='block';
  document.getElementById('hud').style.display='none';
  var _cw=document.getElementById('compass-wrap'); if (_cw) _cw.style.display='none';
  toast('Navigation ended');
}

// ─── Favorites ───
function getFavs() {
  try { return JSON.parse(localStorage.getItem(FAVS_KEY)||'[]'); } catch(e){ return []; }
}
function saveFav(fav) {
  var favs=getFavs();
  favs.unshift(fav);
  if (favs.length>30) favs=favs.slice(0,30);
  localStorage.setItem(FAVS_KEY,JSON.stringify(favs));
}
function deleteFav(id) {
  var favs=getFavs().filter(function(f){ return f.id!==id; });
  localStorage.setItem(FAVS_KEY,JSON.stringify(favs));
}

function toggleFavDest() {
  if (!destLat||!destLon||!destLabel) return;
  var favs=getFavs();
  var existing=favs.findIndex(function(f){ return Math.abs(f.lat-destLat)<0.0001&&Math.abs(f.lon-destLon)<0.0001; });
  var btn=document.getElementById('btn-fav-dest');
  if (existing>-1) {
    deleteFav(favs[existing].id);
    btn.textContent='⭐'; btn.classList.remove('saved');
    toast('Removed from favorites');
  } else {
    saveFav({id:Date.now(),lat:destLat,lon:destLon,name:destLabel.split(' • ')[0],addr:destLabel});
    btn.textContent='❤️'; btn.classList.add('saved');
    toast('Saved to favorites');
  }
}

function openFavs() {
  var favs=getFavs();
  var panel=document.getElementById('fav-panel');
  var list=document.getElementById('fav-list');
  if (!favs.length) {
    list.innerHTML='<div id="fav-empty">No saved places yet.<br><small>Tap ⭐ on any place to save it.</small></div>';
  } else {
    list.innerHTML=favs.map(function(f){
      return '<div class="fav-item" data-lat="'+f.lat+'" data-lon="'+f.lon+'" data-name="'+encodeURIComponent(f.name)+'">'
        +'<div class="fav-icon">⭐</div>'
        +'<div class="fav-text"><div class="fav-name">'+esc(f.name)+'</div>'
        +'<div class="fav-addr">'+esc(f.addr||'')+'</div></div>'
        +'<button class="fav-del" data-id="'+f.id+'" title="Remove">🗑️</button>'
        +'</div>';
    }).join('');
    list.querySelectorAll('.fav-item').forEach(function(el) {
      el.addEventListener('click', function(e) {
        if (e.target.closest('.fav-del')) return;
        closeFavs();
        pickPlace(parseFloat(el.dataset.lat),parseFloat(el.dataset.lon),decodeURIComponent(el.dataset.name));
      });
    });
    list.querySelectorAll('.fav-del').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        deleteFav(parseInt(btn.dataset.id));
        openFavs();
        toast('Removed from favorites');
      });
    });
  }
  panel.style.display='flex';
}

function closeFavs() {
  document.getElementById('fav-panel').style.display='none';
}

// ─── Step helpers ───
function humanStep(s) {
  var t=s.maneuver.type||'', m=s.maneuver.modifier||'', n=s.name||'';
  var road=n?' onto '+n:'', on=n?' on '+n:'';
  if (t==='depart')      return 'Head '+(m||'forward')+on;
  if (t==='arrive')      return 'You have arrived at your destination';
  if (t==='turn')        return 'Turn '+m.replace('-',' ')+road;
  if (t==='new name')    return 'Continue'+road;
  if (t==='merge')       return 'Merge '+(m||'')+road;
  if (t==='on ramp')     return 'Take the ramp '+(m||'');
  if (t==='off ramp')    return 'Take the exit';
  if (t==='fork')        return 'Keep '+(m||'')+' at the fork';
  if (t==='end of road') return 'Turn '+m+' at end of road';
  if (t==='roundabout')  return 'Enter the roundabout, take exit '+(s.maneuver.exit||'');
  if (t==='rotary')      return 'Take the rotary';
  if (t==='continue')    return 'Continue '+(m||'')+on;
  if (t==='use lane')    return 'Use '+(m||'the correct')+' lane';
  return 'Continue'+on;
}

function stepIcon(type, mod) {
  if (type==='depart')   return '🚦';
  if (type==='arrive')   return '🏁';
  if (type==='roundabout'||type==='rotary') return '🔄';
  if (!mod)              return '⬆️';
  var m=mod.toLowerCase();
  if (m==='left')        return '⬅️';
  if (m==='right')       return '➡️';
  if (m==='sharp left')  return '↰';
  if (m==='sharp right') return '↱';
  if (m==='slight left') return '↖️';
  if (m==='slight right')return '↗️';
  if (m==='uturn')       return '↩️';
  return '⬆️';
}

// ─── Utilities ───
function haversine(lat1,lon1,lat2,lon2) {
  var R=6371000, dLat=(lat2-lat1)*Math.PI/180, dLon=(lon2-lon1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function toast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.style.opacity='1';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){ t.style.opacity='0'; },3000);
}
